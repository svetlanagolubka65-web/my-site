<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Александр Голубев — Визитка</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #e8f5e9;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px;
  }

  .card {
    background: rgba(255,255,255,0.93);
    border-radius: 28px;
    border: 1.5px solid #c8e6c9;
    box-shadow: 0 8px 48px rgba(46,125,50,0.12), 0 2px 12px rgba(0,0,0,0.05);
    max-width: 440px; width: 100%;
    padding: 40px 36px 36px; text-align: center;
    position: relative; overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 15% 15%, rgba(165,214,167,0.22) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(129,199,132,0.18) 0%, transparent 40%);
    pointer-events: none;
  }

  /* ── PHOTO ── */
  .photo-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 24px;
    width: 160px; height: 160px;
  }

  .photo-ring {
    width: 156px; height: 156px; border-radius: 50%;
    padding: 4px; display: block;
    background: linear-gradient(135deg, #a5d6a7, #2e7d32, #81c784, #1b5e20, #a5d6a7);
  }

  .photo {
    width: 148px; height: 148px; border-radius: 50%;
    object-fit: cover; object-position: top center;
    display: block; border: 5px solid white;
    animation: photo-breathe 3.5s ease-in-out infinite;
  }

  @keyframes photo-breathe {
    0%, 100% {
      transform: scale(1);
      filter: drop-shadow(0 0 0px rgba(67,160,71,0));
    }
    50% {
      transform: scale(1.045);
      filter: drop-shadow(0 0 12px rgba(67,160,71,0.45));
    }
  }

  /* Sparkles */
  .sparkle {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
  }
  .sparkle:nth-child(1) {
    width: 7px; height: 7px; background: #43a047;
    top: 8px; left: 12px;
    animation: spark 3.2s 0s ease-in-out infinite;
  }
  .sparkle:nth-child(2) {
    width: 5px; height: 5px; background: #66bb6a;
    top: 2px; right: 22px;
    animation: spark 3.2s 0.9s ease-in-out infinite;
  }
  .sparkle:nth-child(3) {
    width: 6px; height: 6px; background: #2e7d32;
    bottom: 12px; left: 6px;
    animation: spark 3.2s 1.7s ease-in-out infinite;
  }
  .sparkle:nth-child(4) {
    width: 5px; height: 5px; background: #81c784;
    bottom: 8px; right: 14px;
    animation: spark 3.2s 2.5s ease-in-out infinite;
  }
  .sparkle:nth-child(5) {
    width: 4px; height: 4px; background: #43a047;
    top: 50%; left: -2px;
    animation: spark 3.2s 1.2s ease-in-out infinite;
  }

  @keyframes spark {
    0%   { opacity: 0; transform: translateY(0) scale(0.4); }
    30%  { opacity: 0.85; transform: translateY(-10px) scale(1); }
    70%  { opacity: 0.5; transform: translateY(-20px) scale(0.7); }
    100% { opacity: 0; transform: translateY(-30px) scale(0.2); }
  }

  /* ── NAME ── */
  .name {
    font-size: 30px; font-weight: 800; letter-spacing: -0.5px;
    color: #1b5e20;
    line-height: 1.15; margin-bottom: 10px;
    animation: name-glow 4s ease-in-out infinite;
  }

  @keyframes name-glow {
    0%, 100% { text-shadow: none; color: #1b5e20; }
    50% { text-shadow: 0 0 20px rgba(46,125,50,0.35); color: #2e7d32; }
  }

  /* ── BADGE ── */
  .badge {
    display: inline-flex; align-items: center; gap: 7px;
    background: #f1f8e9; border: 1.5px solid #a5d6a7;
    border-radius: 30px; padding: 7px 18px; margin-bottom: 26px;
  }
  .badge-text { font-size: 13px; font-weight: 700; color: #2e7d32; }

  .divider {
    height: 1.5px;
    background: linear-gradient(90deg, transparent, #a5d6a7, transparent);
    margin: 0 0 22px;
  }

  .social-label {
    font-size: 11px; font-weight: 700; color: #2e7d32;
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px;
  }

  /* ── SOCIALS ── */
  .socials { display: flex; justify-content: center; gap: 14px; margin-bottom: 30px; flex-wrap: wrap; }

  .soc {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    text-decoration: none; cursor: pointer;
  }

  .soc-icon {
    width: 54px; height: 54px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    transition: box-shadow 0.25s;
  }

  /* Sheen overlay */
  .soc-icon::before {
    content: '';
    position: absolute;
    top: -50%; left: -75%;
    width: 50%; height: 200%;
    background: rgba(255,255,255,0);
    transform: skewX(-20deg);
    transition: none;
  }

  .soc:hover .soc-icon {
    animation: soc-jump-wiggle 0.55s cubic-bezier(.36,.07,.19,.97);
    box-shadow: 0 14px 28px rgba(0,0,0,0.22);
  }

  .soc:hover .soc-icon::before {
    animation: sheen 0.55s ease forwards;
  }

  @keyframes soc-jump-wiggle {
    0%   { transform: translateY(0)    rotate(0deg); }
    20%  { transform: translateY(-10px) rotate(-5deg); }
    40%  { transform: translateY(-14px) rotate(5deg); }
    60%  { transform: translateY(-8px)  rotate(-3deg); }
    80%  { transform: translateY(-4px)  rotate(2deg); }
    100% { transform: translateY(0)    rotate(0deg); }
  }

  @keyframes sheen {
    0%   { left: -75%; background: rgba(255,255,255,0); }
    40%  { background: rgba(255,255,255,0.28); }
    100% { left: 125%; background: rgba(255,255,255,0); }
  }

  .i-tg { background: linear-gradient(145deg, #40c0f0, #0277bd); }
  .i-vk { background: linear-gradient(145deg, #6c7fd8, #283593); }
  .i-ok { background: linear-gradient(145deg, #ffb74d, #e65100); }
  .i-ig { background: linear-gradient(145deg, #f48fb1, #c2185b, #7b1fa2, #f4511e); }

  .soc-name {
    font-size: 11px; font-weight: 700; color: #2e7d32;
    transition: color 0.2s;
  }
  .soc:hover .soc-name { color: #1b5e20; }

  /* ── CTA ── */
  .cta {
    display: inline-flex; align-items: center; gap: 10px;
    background: #2e7d32; color: white;
    font-size: 15px; font-weight: 700;
    padding: 14px 38px; border-radius: 50px; border: none;
    cursor: pointer; text-decoration: none; letter-spacing: 0.5px;
    box-shadow: 0 4px 20px rgba(46,125,50,0.35);
    position: relative; overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    animation: pulse-btn 2.8s ease-in-out infinite;
  }

  .cta::before {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
    transition: left 0.45s;
  }
  .cta:hover::before { left: 100%; }
  .cta:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(46,125,50,0.5);
    background: #1b5e20;
    animation: none;
  }
  .cta:active { transform: scale(0.97); }

  @keyframes pulse-btn {
    0%,100% { box-shadow: 0 4px 20px rgba(46,125,50,0.35); }
    50% { box-shadow: 0 4px 36px rgba(46,125,50,0.65); }
  }

  @media (max-width: 480px) {
    .card { padding: 30px 20px 26px; border-radius: 22px; }
    .name { font-size: 24px; }
    .photo { width: 122px; height: 122px; }
    .photo-ring { width: 130px; height: 130px; }
    .photo-wrap { width: 134px; height: 134px; }
    .soc-icon { width: 48px; height: 48px; border-radius: 13px; }
    .cta { font-size: 14px; padding: 12px 28px; }
  }
</style>
</head>
